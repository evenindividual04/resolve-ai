version: "3.9"

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/negotiation
      REDIS_URL: redis://redis:6379/0
      LLM_PROVIDER: ${LLM_PROVIDER:-groq}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY:-}
      CEREBRAS_MODEL: ${CEREBRAS_MODEL:-llama-3.3-70b}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-pro}
      USE_QUEUE_INGEST: ${USE_QUEUE_INGEST:-false}
      ORCHESTRATION_ENGINE: ${ORCHESTRATION_ENGINE:-custom}
    depends_on:
      - postgres
      - redis

  worker:
    build: .
    command: ["python", "scripts/run_worker.py"]
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/negotiation
      REDIS_URL: redis://redis:6379/0
      LLM_PROVIDER: ${LLM_PROVIDER:-groq}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY:-}
      CEREBRAS_MODEL: ${CEREBRAS_MODEL:-llama-3.3-70b}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-pro}
      ORCHESTRATION_ENGINE: ${ORCHESTRATION_ENGINE:-custom}
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: negotiation
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  pgdata:
