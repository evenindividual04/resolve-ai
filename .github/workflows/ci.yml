name: CI

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  test-and-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Sync dependencies
        run: |
          uv sync

      - name: Unit tests
        run: uv run pytest -q -k "not integration and not integration_services and not e2e"

      - name: Adversarial regression gate
        run: uv run python scripts/regression_gate.py

  integration-services:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: negotiation
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d negotiation"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Sync dependencies
        run: |
          uv sync

      - name: Integration tests
        env:
          INTEGRATION_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/negotiation
          INTEGRATION_REDIS_URL: redis://localhost:6379/0
        run: uv run pytest -q tests/test_integration_services.py
