services:
  - type: web
    name: resolve-ai-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: resolve-ai-db
          property: connectionString
      - key: ORCHESTRATION_ENGINE
        value: custom
      - key: USE_QUEUE_INGEST
        value: "false"
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: CEREBRAS_API_KEY
        sync: false
      - key: CEREBRAS_MODEL
        value: llama-3.3-70b
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-1.5-pro
      - key: QUEUE_MAX_RETRIES
        value: "3"
      - key: QUEUE_RETRY_BACKOFF_SECONDS
        value: "0.5"
      - key: LLM_REQUEST_TIMEOUT_SECONDS
        value: "12"
      - key: LLM_REQUEST_MAX_RETRIES
        value: "3"
      - key: LLM_MIN_REQUEST_INTERVAL_SECONDS
        value: "0"
      - key: ENABLE_OTEL
        value: "false"

databases:
  - name: resolve-ai-db
    plan: free
    databaseName: negotiation
    user: postgres
